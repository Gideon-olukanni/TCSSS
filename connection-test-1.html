<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firestore Connection Test</title>
<style>
  body{ font-family:-apple-system,sans-serif; padding:24px; font-size:17px; line-height:1.6; background:#faf6f6; color:#1e1d3d; }
  h2{ margin-bottom:4px; }
  .sub{ color:#5b5a6b; font-size:14px; margin-bottom:20px; }
  #out{ background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
  .line{ padding:6px 0; border-bottom:1px solid #eee; }
  .ok{ color:#1e7e34; font-weight:600; }
  .fail{ color:#c0392b; font-weight:600; }
  .banner{ margin-top:18px; padding:16px 18px; border-radius:10px; font-weight:700; font-size:18px; text-align:center; display:none; }
  .banner.pass{ background:#1e7e34; color:#fff; }
  .banner.fail{ background:#c0392b; color:#fff; }
  #copyBtn{ margin-top:14px; padding:10px 18px; border-radius:999px; border:none; background:#11104a; color:#fff; font-size:14px; display:none; }
</style>
</head>
<body>

<h2>Firestore Connection Test</h2>
<div class="sub">Isolated test — no admin panel, no UI, just: connect → sign in → write → read.</div>
<div id="out"><div class="line">Running…</div></div>
<div id="banner" class="banner"></div>
<button id="copyBtn" onclick="navigator.clipboard.writeText(document.getElementById('out').innerText); this.textContent='Copied!';">Copy result to clipboard</button>

<script type="module">
// ============================================================
// FILL IN THESE TWO THINGS ONLY:
// ============================================================

// 1. Your real Firebase config — copy-paste from Firebase Console →
//    Project settings → Your apps → Web app. Never retype by hand.
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY_HERE",
  authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
  projectId: "PASTE_YOUR_PROJECT_ID",
  messagingSenderId: "PASTE_YOUR_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

// 2. One of the 3 real admin accounts you created in Firebase
//    Console → Authentication → Users.
const TEST_EMAIL = "PASTE_A_REAL_ADMIN_EMAIL_HERE";
const TEST_PASSWORD = "PASTE_ITS_REAL_PASSWORD_HERE";

// ============================================================
// If this fails, flip this ONE flag and redeploy — that's the
// only variable to test. Nothing else in this file should change.
// ============================================================
const USE_FORCED_LONG_POLLING = false;

// ============================================================
// Everything below just runs the test — no need to edit it.
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, initializeFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const out = document.getElementById('out');
const banner = document.getElementById('banner');
const copyBtn = document.getElementById('copyBtn');
function log(msg, cls) {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = msg;
  out.appendChild(div);
}

(async () => {
  out.innerHTML = '';
  try {
    log('Config uses forced long-polling: ' + USE_FORCED_LONG_POLLING);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = USE_FORCED_LONG_POLLING
      ? initializeFirestore(app, { experimentalForceLongPolling: true, useFetchStreams: false })
      : getFirestore(app);
    log('✅ Step 1: App initialized', 'ok');

    await signInWithEmailAndPassword(auth, TEST_EMAIL, TEST_PASSWORD);
    log('✅ Step 2: Signed in as ' + TEST_EMAIL, 'ok');

    await setDoc(doc(db, 'connectionTest', 'ping'), { time: Date.now() });
    log('✅ Step 3: WRITE succeeded', 'ok');

    const snap = await getDoc(doc(db, 'connectionTest', 'ping'));
    log('✅ Step 4: READ succeeded — ' + JSON.stringify(snap.data()), 'ok');

    banner.textContent = '✅ ALL TESTS PASSED — connection is fine, safe to build the full admin panel.';
    banner.className = 'banner pass';
    banner.style.display = 'block';
  } catch (e) {
    log('❌ FAILED — ' + (e.code || '') + ' ' + (e.message || e), 'fail');
    banner.textContent = '❌ FAILED at the step above. Copy the result and send it back.';
    banner.className = 'banner fail';
    banner.style.display = 'block';
  }
  copyBtn.style.display = 'inline-block';
})();
</script>
</body>
</html>
